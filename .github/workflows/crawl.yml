name: findr-spider
on:
  schedule:
    - cron: '0 0 * * *' # Triggered once daily at midnight UTC
  workflow_dispatch: # Enables manual triggering from the Actions UI

concurrency:
  group: "spider-crawl"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Execute Crawler
        run: python findr_spider.py

      - name: Track Indexing Statistics
        run: python findr_stats.py

      - name: Commit and Push Updated Index
        run: |
          git config --global user.name "findr-bot"
          git config --global user.email "bot@findr.search"
          
          # Add the newly generated alphabetical JSON shards
          git add index/*.json
          
          # Add the updated statistics file
          git add index_stats.json
          
          # Check for changes to avoid empty commits
          if git diff --staged --quiet; then
            echo "No changes to index or statistics."
            exit 0
          fi
          
          git commit -m "Update index and stats: $(date +'%Y-%m-%d %I:%M %p')"
          
          # Use rebase to ensure local changes are applied on top of remote branch history
          git pull --rebase origin main
          git push
